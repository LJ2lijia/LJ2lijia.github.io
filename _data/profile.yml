short_bio_text_justify: false
short_bio: >-
  <p>
    I am the tenure-track Assistant Professor of <a href="https://collegeai.tsinghua.edu.cn/">College of AI</a> at <a href="https://www.tsinghua.edu.cn/">Tsinghua University</a>. I obtained my PhD degree from <a href="https://www.pku.edu.cn/">Peking University</a> in 2025, supervised by Prof. <a href="https://scholar.google.com.hk/citations?user=ZC7SObAAAAAJ&hl">Zhi Jin</a> and Prof. <a href="https://ligechina.github.io/">Ge Li</a>.
  </p>
  <p>
    I lead the Tsinghua Foundation Models and Agents Group and work closely with Prof. <a href="https://scholar.google.com/citations?user=LDb4tb0AAAAJ&hl=en">Shi-Min Hu</a>. Recently, our research group has been focusing on the following areas:
    <ul>
      <li> Foundation Models: Designing novel model architectures, training/inference algorithms, and evaluation benchmarks for foundation models (including language models and multi-modal models). We are particularly interested in improving the reasoning ability, planning ability, tool-calling ability, and safety of foundation models.
      <li> Agents: Developing powerful agents in digital and physical worlds, such as software engineering agents, AI scientists, and embodied agents.
    </ul>
  </p>
  <p>
    I am looking for <b>highly-motivated interns</b> to join my group. Feel free to email me with your resume attached.
  </p>

